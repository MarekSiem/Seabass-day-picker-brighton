  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ay: swap;\n  src: url(\"d9e89935-c651-4b6b-bb2d-7814fef57e92\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"03a10eb2-a4a8-476a-8fbb-2a7e86b02202\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"f279a35c-28c1-47da-b21b-f8ad85baa0ac\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"d9e89935-c651-4b6b-bb2d-7814fef57e92\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"03a10eb2-a4a8-476a-8fbb-2a7e86b02202\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"f279a35c-28c1-47da-b21b-f8ad85baa0ac\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"d9e89935-c651-4b6b-bb2d-7814fef57e92\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    *{box-sizing:border-box;margin:0;padding:0}\n    html,body{background:#091521;}\n    a{color:#4fd6c8;}\n    a:hover{color:#7fe8dc;}\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:radial-gradient(120% 80% at 50% -10%,#102b42 0%,#0b1c2c 45%,#081420 100%);font-family:Barlow,system-ui,sans-serif;color:#e8f0f7;padding:clamp(18px,4vw,40px) clamp(14px,3vw,24px) 64px;\">\n  <div style=\"max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:28px;\">\n\n    <!-- header -->\n    <div>\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#4fd6c8;font-weight:600;\">User guide<\u002Fdiv>\n      <h1 style=\"font-family:'Space Grotesk',sans-serif;font-size:clamp(26px,6vw,36px);font-weight:700;letter-spacing:-1px;line-height:1.1;margin:6px 0 10px;\">Bass Day Picker<\u002Fh1>\n      <p style=\"font-size:15px;color:#b9cad8;line-height:1.6;\">A free tool that reads the live 7-day marine and weather forecast for <strong>Brighton<\u002Fstrong> and <strong>Shoreham<\u002Fstrong>, scores each day out of 100 for shore seabass fishing, and tells you the best day — and the best times of day — to go.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- how to run -->\n    <div style=\"background:#0c2031;border:1px solid #1f3a52;border-radius:16px;padding:clamp(16px,4vw,24px);\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;margin-bottom:14px;\">Getting it running<\u002Fh2>\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <div>\n          <div style=\"font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#4fd6c8;font-weight:600;margin-bottom:6px;\">iPhone / Android — use the web link<\u002Fdiv>\n          <ol style=\"font-size:14px;color:#cddcea;line-height:1.7;padding-left:20px;display:flex;flex-direction:column;gap:6px;\">\n            <li>You'll receive a <strong>link<\u002Fstrong> on WhatsApp. Tap it — the tool opens in your browser. No login, no app, nothing to sign up for.<\u002Fli>\n            <li>Handy: tap the share icon → <strong>\"Add to Home Screen\"<\u002Fstrong> and it becomes an app-style icon you can open any time.<\u002Fli>\n            <li>Each time you open it, it fetches a fresh forecast — so you need an internet connection, but nothing else.<\u002Fli>\n          <\u002Fol>\n          <div style=\"background:#2a1520;border:1px solid #5b2b3a;border-radius:10px;padding:12px 16px;font-size:13px;color:#f0b8c4;line-height:1.6;margin-top:10px;\">⚠️ Don't try to open the tool as a <strong>saved file<\u002Fstrong> on a phone — iPhone (and Android) block local files from reaching the internet for security, so you'll see \"Couldn't reach the forecast\". There's no setting to allow it; the link is the way.<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#4fd6c8;font-weight:600;margin-bottom:6px;\">Laptop — link or file, both work<\u002Fdiv>\n          <ol style=\"font-size:14px;color:#cddcea;line-height:1.7;padding-left:20px;display:flex;flex-direction:column;gap:6px;\">\n            <li>Open the same link in any browser, <strong>or<\u002Fstrong> if you were sent the file, save it anywhere (Desktop is fine) and <strong>double-click it<\u002Fstrong> — laptops don't have the phone restriction.<\u002Fli>\n          <\u002Fol>\n        <\u002Fdiv>\n        <div style=\"background:#0a1c2c;border:1px solid #1f3a52;border-radius:10px;padding:12px 16px;font-size:13px;color:#7d95a9;line-height:1.6;\">💡 Tip: if it ever looks stuck on \"Reading the water…\", check your internet connection and reload the page.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- how to read it -->\n    <div style=\"background:#0c2031;border:1px solid #1f3a52;border-radius:16px;padding:clamp(16px,4vw,24px);\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;margin-bottom:14px;\">How to read it<\u002Fh2>\n      <ul style=\"font-size:14px;color:#cddcea;line-height:1.7;padding-left:20px;display:flex;flex-direction:column;gap:8px;\">\n        <li><strong>Pick of the week<\u002Fstrong> (top card) — the highest-scoring day, with the recommended <strong>dawn and dusk windows<\u002Fstrong>. These are the prime bass feeding times; the scores are calculated for those windows, not midday.<\u002Fli>\n        <li><strong>7-day strip<\u002Fstrong> — tap any day to see its full breakdown. <span style=\"color:#2fd6c6;\">Prime (80+)<\u002Fspan> · <span style=\"color:#57c88a;\">Good (64+)<\u002Fspan> · <span style=\"color:#e8a23c;\">Fair (46+)<\u002Fspan> · <span style=\"color:#e06a6a;\">Poor<\u002Fspan>.<\u002Fli>\n        <li><strong>Why this score<\u002Fstrong> — every factor's contribution, e.g. \"Wind 18/26\". This is the part that lets you overrule the tool (see below).<\u002Fli>\n        <li><strong>Brighton / Shoreham toggle<\u002Fstrong> — conditions a few miles apart can differ, especially wind exposure.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n    <!-- reasoning -->\n    <div style=\"background:#0c2031;border:1px solid #1f3a52;border-radius:16px;padding:clamp(16px,4vw,24px);\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;margin-bottom:6px;\">How the score works<\u002Fh2>\n      <p style=\"font-size:13px;color:#7d95a9;margin-bottom:14px;\">Weighted out of 100. Bigger weight = matters more for shore bass.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:10px;\">\n        <sc-for list=\"{{ factors }}\" as=\"f\" hint-placeholder-count=\"7\">\n          <div style=\"display:flex;gap:12px;align-items:baseline;\">\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:#4fd6c8;flex:none;width:88px;\">{{ f.name }} <span style=\"color:#56708e;font-weight:500;\">/{{ f.max }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:13px;color:#b9cad8;line-height:1.6;\">{{ f.why }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- recording catches -->\n    <div style=\"background:#0c2031;border:1px solid #2b5b4a;border-radius:16px;padding:clamp(16px,4vw,24px);\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;margin-bottom:6px;color:#57c88a;\">Recording your catches<\u002Fh2>\n      <p style=\"font-size:13px;color:#7d95a9;margin-bottom:16px;\">Log every catch (and blanks!) and we can compare them against the forecast scores later — over a season this tunes the tool to what actually works on your marks. Two ways, both hands-free at the waterside:<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <div>\n          <div style=\"font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#57c88a;font-weight:600;margin-bottom:6px;\">Option A — zero setup: Siri + Reminders<\u002Fdiv>\n          <ol style=\"font-size:14px;color:#cddcea;line-height:1.7;padding-left:20px;display:flex;flex-direction:column;gap:6px;\">\n            <li>In the <strong>Reminders<\u002Fstrong> app, tap <strong>Add List<\u002Fstrong> and call it <strong>\"Seafishing Catch\"<\u002Fstrong> (one-time, 30 seconds).<\u002Fli>\n            <li>At the waterside, wet hands and all: <em>\"Hey Siri, add 2 pound bass on lure to my Seafishing Catch list.\"<\u002Fem><\u002Fli>\n            <li>Say the useful details in the sentence itself — species, weight, bait/lure, and the mark: <em>\"…add schoolie bass, ragworm, Shoreham harbour arm, to my Seafishing Catch list.\"<\u002Fem><\u002Fli>\n          <\u002Fol>\n          <div style=\"background:#0a1c2c;border:1px solid #1f3a52;border-radius:10px;padding:12px 16px;font-size:13px;color:#7d95a9;line-height:1.6;margin-top:10px;\">⚠️ Date and time <strong>are<\u002Fstrong> saved automatically (hidden in each reminder's details), but <strong>location is not<\u002Fstrong> — so always say the mark out loud. Works offline; syncs when you're back in signal.<\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#57c88a;font-weight:600;margin-bottom:6px;\">Option B — 10-minute setup, best data: a \"Log Catch\" Shortcut<\u002Fdiv>\n          <p style=\"font-size:14px;color:#cddcea;line-height:1.7;margin-bottom:8px;\">The <strong>Shortcuts<\u002Fstrong> app (already on every iPhone) can capture date, time <strong>and GPS position<\u002Fstrong> automatically, so you only speak the catch itself. One-time setup:<\u002Fp>\n          <ol style=\"font-size:14px;color:#cddcea;line-height:1.7;padding-left:20px;display:flex;flex-direction:column;gap:6px;\">\n            <li>Open <strong>Shortcuts<\u002Fstrong> → <strong>+<\u002Fstrong> to make a new shortcut, name it <strong>\"Log Catch\"<\u002Fstrong>.<\u002Fli>\n            <li>Add these actions in order: <strong>Dictate Text<\u002Fstrong> → <strong>Get Current Location<\u002Fstrong> → <strong>Text<\u002Fstrong> (compose a line like: <em>Dictated Text — Current Date — Current Location<\u002Fem>, picking the variables) → <strong>Append to Note<\u002Fstrong> (a note called \"Catch Log\").<\u002Fli>\n            <li>At the waterside: <em>\"Hey Siri, Log Catch\"<\u002Fem> — it listens, you say <em>\"3 pound bass, white sandeel, low light\"<\u002Fem>, and it files the entry with exact time and position.<\u002Fli>\n          <\u002Fol>\n        <\u002Fdiv>\n        <div style=\"background:#0a1c2c;border:1px solid #1f3a52;border-radius:10px;padding:12px 16px;font-size:13px;color:#7d95a9;line-height:1.6;\">🎣 <strong>Feeding it back:<\u002Fstrong> every month or so, share the list (Reminders: list → share; Notes: export the note) over WhatsApp. Matched against the day-by-day forecast scores, it shows which conditions genuinely produce fish for you — and the scoring weights can be adjusted to suit.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- shortfalls -->\n    <div style=\"background:#0c2031;border:1px solid #5b4a2b;border-radius:16px;padding:clamp(16px,4vw,24px);\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;margin-bottom:6px;color:#e8c56a;\">Know its limits<\u002Fh2>\n      <p style=\"font-size:13px;color:#7d95a9;margin-bottom:14px;\">The tool is a guide, not gospel. Where it can mislead you — and what to do about it:<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <sc-for list=\"{{ limits }}\" as=\"l\" hint-placeholder-count=\"6\">\n          <div style=\"border-left:2px solid #5b4a2b;padding-left:14px;\">\n            <div style=\"font-size:14px;font-weight:600;color:#e8c56a;margin-bottom:3px;\">{{ l.title }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:#b9cad8;line-height:1.6;\">{{ l.body }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- override -->\n    <div style=\"background:#0c2031;border:1px solid #1f3a52;border-radius:16px;padding:clamp(16px,4vw,24px);\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:700;margin-bottom:14px;\">When to overrule it<\u002Fh2>\n      <ul style=\"font-size:14px;color:#cddcea;line-height:1.7;padding-left:20px;display:flex;flex-direction:column;gap:8px;\">\n        <li><strong>The day after a blow.<\u002Fstrong> The tool may score a calming-down day only \"Fair\" because of leftover swell — but the first settled tide after a storm, with colour still in the water, is classic big-bass time. If Surf shows \"lumpy\" but Wind is easing, consider going.<\u002Fli>\n        <li><strong>A flat-calm scorcher.<\u002Fstrong> High scores driven by comfort (light wind, settled pressure) can still mean hard fishing — gin-clear, bright water sends bass out deep. Fish the dawn window only, or wait for cloud.<\u002Fli>\n        <li><strong>Neaps aren't dead.<\u002Fstrong> The tide factor favours springs, but some marks fish better on neaps (weed stays down, longer slack). If you know your mark disagrees, trust the mark.<\u002Fli>\n        <li><strong>The score is site-blind within each town.<\u002Fstrong> A \"Poor\" onshore day at the open beach can be fishable in the lee of Shoreham's harbour arm or Brighton Marina's walls.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n\n    <div style=\"font-size:12px;color:#56708399;line-height:1.7;text-align:center;\">Forecast data: Open-Meteo (free, public). Safety first — never fish a lee shore in heavy swell, and always check the actual sea state before casting.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      factors: [\n        { name: \"Wind\", max: 26, why: \"The biggest factor. Light winds (under ~14 mph) are ideal; a moderate onshore breeze earns a bonus because it stirs food into the surf; over ~26 mph the mark is blown out. Direction matters: south-facing beaches mean S/SW winds are 'onshore'.\" },\n        { name: \"Surf\", max: 22, why: \"Bass hunt in moving water. A clean 0.4–0.9 m surf scores best; dead flat is mediocre; over ~1.8 m is unsafe and unfishable from the shore.\" },\n        { name: \"Sea temp\", max: 14, why: \"Bass feed hard above ~14 °C, slow right down below ~10 °C. This mostly separates seasons, not days.\" },\n        { name: \"Tide\", max: 12, why: \"Estimated from the moon: spring tides (new/full moon) move more water and usually fish better than neaps. This is tidal energy only — NOT the actual high/low water times.\" },\n        { name: \"Pressure\", max: 10, why: \"Settled high pressure, or a gently falling glass (a 'feed-up' before weather), scores well. Fast-swinging pressure scores poorly.\" },\n        { name: \"Gusts\", max: 8, why: \"Steady wind is fishable; violent gusts (40 mph+) make casting and bite detection miserable regardless of the average.\" },\n        { name: \"Light\", max: 8, why: \"Overcast beats bright sun — bass come closer in low light. This is why the dawn/dusk windows are shown.\" }\n      ],\n      limits: [\n        { title: \"No real tide times\", body: \"The tool knows springs vs neaps from the moon, but not when high water is. Bass fishing is often best 2 hours either side of high water — check an actual tide table (the tool links to one) and line the dawn/dusk window up with the tide before committing.\" },\n        { title: \"Forecasts drift\", body: \"Days 5–7 are educated guesses. A '90' six days out can become a '55' by the time it arrives. Re-open the tool the evening before you go — it always fetches fresh data.\" },\n        { title: \"Water clarity is invisible to it\", body: \"The scoring can't see weed, dirty river water (Shoreham sits on the Adur mouth), or leftover storm murk. A quick look at the water beats any forecast.\" },\n        { title: \"It doesn't know the fish are there\", body: \"It scores conditions, not fish. No baitfish, no bass. Local reports and bird activity trump a good score.\" },\n        { title: \"One score per town\", body: \"Brighton and Shoreham each get a single open-beach score. Sheltered spots (harbour arms, marina walls) can fish when the open beach can't — and vice versa.\" },\n        { title: \"Tuned for shore fishing\", body: \"Swell and wind tolerances assume you're standing on the beach. From a boat or kayak the safe limits are entirely different — don't use the score as a safety call afloat.\" }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
